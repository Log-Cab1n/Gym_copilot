name: gym_copilot
description: "智能健身训练跟踪与数据分析助手 - Pro Edition"
publish_to: 'none'

version: 1.2.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1
  intl: ^0.20.2
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  package_info_plus: ^8.0.0
  shorebird_code_push: ^1.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.2
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - shorebird.yaml

dependency_overrides:
  fl_chart: 0.66.2

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon_rounded.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "assets/app_icon_rounded.png"
  adaptive_icon_foreground: "assets/app_icon_rounded.png"

