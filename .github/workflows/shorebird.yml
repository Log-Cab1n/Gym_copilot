name: Shorebird

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command'
        required: true
        default: 'patch'
        type: choice
        options:
          - release
          - patch
          - list-releases
          - delete-release
      platform:
        description: 'Platform'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
      artifact:
        description: 'Artifact type (release only)'
        required: false
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
      release_version:
        description: 'Release version for patch (e.g., 1.0.0+1)'
        required: false
        default: 'latest'

jobs:
  shorebird:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1

      - name: List Releases
        if: ${{ inputs.command == 'list-releases' }}
        run: |
          echo "=== Shorebird Releases ==="
          shorebird releases list || echo "No releases found or command not available"
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Delete Release
        if: ${{ inputs.command == 'delete-release' }}
        run: |
          echo "Deleting release ${{ inputs.release_version }}..."
          shorebird releases delete --version ${{ inputs.release_version }} --platform ${{ inputs.platform }} || echo "Release not found or already deleted"
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Shorebird Release
        if: ${{ inputs.command == 'release' }}
        run: shorebird release ${{ inputs.platform }} --artifact ${{ inputs.artifact }} -- --no-tree-shake-icons
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

      - name: Upload APK Artifact
        if: ${{ inputs.command == 'release' && inputs.artifact == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Shorebird Patch
        if: ${{ inputs.command == 'patch' }}
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.release_version }}" != "latest" ]; then
            ARGS="--release-version=${{ inputs.release_version }}"
          fi
          echo "Running: shorebird patch ${{ inputs.platform }} $ARGS"
          shorebird patch ${{ inputs.platform }} $ARGS
